<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
	<rect width="32" height="32" rx="8" fill="#faf6f1" />
	<rect width="32" height="32" rx="8" fill="url(#g)" opacity="0.35" />
	<!--
	  Letter T: crossbar + vertical stem. The stem continues into a tilted note head (Taylor / tune).
	  Small flag on the stem so it reads as a quaver, not just a T with a dot.
	-->
	<g fill="#9f1239">
		<rect x="4" y="4.5" width="24" height="4" rx="1.15" />
		<rect x="14.25" y="8.5" width="3.5" height="13" rx="0.45" />
		<ellipse cx="17.4" cy="22.65" rx="4.1" ry="2.8" transform="rotate(-28 17.4 22.65)" />
		<path
			d="M 17.75 9
			   C 22.2 9.6 25.5 12.8 25.5 16.5
			   C 25.5 18.4 23.8 19.8 21.4 19.5
			   L 17.75 11.8
			   C 20.6 12.3 22.4 10.8 21.2 9.2
			   C 20.4 8.2 18.8 8.1 17.75 9 Z"
		/>
	</g>
	<defs>
		<linearGradient id="g" x1="4" y1="4" x2="28" y2="28" gradientUnits="userSpaceOnUse">
			<stop stop-color="#fda4af" />
			<stop offset="1" stop-color="#9f1239" stop-opacity="0.4" />
		</linearGradient>
	</defs>
</svg>
