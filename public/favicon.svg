<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
	<rect width="32" height="32" rx="8" fill="#faf6f1" />
	<rect width="32" height="32" rx="8" fill="url(#g)" opacity="0.35" />
	<!-- One letter: easy to change (font-size, weight, or try ♪ / TS monogram in a second <text>) -->
