<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
	<rect width="32" height="32" rx="8" fill="#faf6f1" />
	<rect width="32" height="32" rx="8" fill="url(#g)" opacity="0.35" />
	<!-- Single eighth note, centered on (16, 16) -->
	<g fill="#9f1239" transform="translate(15 16)">
		<!-- Note head (filled oval, tilted) -->
		<ellipse cx="-3.8" cy="7.2" rx="3.35" ry="2.35" transform="rotate(-24 -3.8 7.2)" />
		<!-- Stem -->
		<rect x="-0.85" y="-10" width="1.7" height="16.5" rx="0.35" />
		<!-- Flag -->
		<path
			d="M 0.85 -10
			   C 5.5 -9.2 9 -5.8 9 -1.8
			   C 9 1.2 6 3.8 2 4.8
			   L 0.85 3.4
			   C 4 2.6 6.2 0.5 6.2 -2
			   C 6.2 -5.2 3.8 -7.8 0.85 -8.6
			   Z"
		/>
	</g>
	<defs>
		<linearGradient id="g" x1="4" y1="4" x2="28" y2="28" gradientUnits="userSpaceOnUse">
			<stop stop-color="#fda4af" />
			<stop offset="1" stop-color="#9f1239" stop-opacity="0.4" />
		</linearGradient>
	</defs>
</svg>
