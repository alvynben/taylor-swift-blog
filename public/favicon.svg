<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
	<rect width="32" height="32" rx="8" fill="#faf6f1" />
	<rect width="32" height="32" rx="8" fill="url(#g)" opacity="0.35" />
	<!--
	  Tab icons are tiny: full "girlfriend" / "boyfriend" won’t fit. This uses gf / bf.
	  Open Graph (og.png) has the full phrase. Hearts are ♥ (U+2665) so they render without emoji fonts.
	-->
	<text
		x="16"
		y="13.5"
		text-anchor="middle"
		font-family="Georgia, 'Times New Roman', serif"
		font-size="12"
		font-weight="700"
		fill="#9f1239"
	>TS</text>
	<text
		x="16"
		y="22.5"
		text-anchor="middle"
		font-family="Georgia, 'Times New Roman', serif"
		font-size="6.25"
		fill="#881337"
	>♥ gf ♥ bf</text>
	<defs>
		<linearGradient id="g" x1="4" y1="4" x2="28" y2="28" gradientUnits="userSpaceOnUse">
			<stop stop-color="#fda4af" />
			<stop offset="1" stop-color="#9f1239" stop-opacity="0.4" />
		</linearGradient>
	</defs>
</svg>
