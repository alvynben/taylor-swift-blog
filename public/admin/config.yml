# Decap CMS — https://decapcms.org/docs/github-backend/
#
# === Vercel + GitHub (uses Netlify only as OAuth signer; site stays on Vercel) ===
#
# 1) GitHub OAuth app: https://github.com/settings/developers
#    - Application name: anything (e.g. Decap CMS — boyfriend guide)
#    - Homepage URL: https://boyfriendguidetotaylorswift.com
#    - Authorization callback URL: https://api.netlify.com/auth/done
#    - Save Client ID and generate a Client Secret
#
# 2) Netlify (free account; you do NOT need to host the site there):
#    - Create any site if prompted (e.g. import the same GitHub repo once), then open that site.
#    - Site configuration → Access & security → OAuth → Install provider → GitHub
#    - Paste the GitHub Client ID and Client Secret and save.
#    Docs: https://docs.netlify.com/manage/security/secure-access-to-sites/oauth-provider-tokens/
#
# 3) Set backend.repo below to your GitHub owner/repo (same repo Vercel deploys from).
#
# 4) Commit, push, wait for Vercel deploy, then open /admin and “Login with GitHub”.
#
# Local editing: add `local_backend: true` under backend and run `npx decap-server` (see README).

backend:
  name: github
  repo: alynben/taylor-swift-blog
  branch: main
  auth_scope: repo # lets Decap commit; use public_repo if the repo is only public and you prefer
  # Required when the admin UI is served from Vercel (not Netlify):
  base_url: https://boyfriendguidetotaylorswift.com
  auth_endpoint: https://api.netlify.com/auth

media_folder: public/images/blog
public_folder: /images/blog

collections:
  - name: blog
    label: Blog posts
    folder: src/content/blog
    create: true
    slug: '{{filenameSlug}}'
    extension: md
    format: frontmatter
    fields:
      - { label: Title, name: title, widget: string }
      - label: URL slug (filename)
        name: filenameSlug
        widget: string
        hint: 'Lowercase-with-dashes, e.g. my-new-post (becomes my-new-post.md)'
      - { label: Description, name: description, widget: text }
      - label: Publish date
        name: pubDate
        widget: datetime
        date_format: YYYY-MM-DD
        time_format: false
        picker_utc: false
      - { label: Category, name: category, widget: string, required: false }
      - { label: Draft, name: draft, widget: boolean, default: false }
      - { label: Body, name: body, widget: markdown }
