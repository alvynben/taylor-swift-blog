<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
	<rect width="32" height="32" rx="8" fill="#faf6f1" />
	<rect width="32" height="32" rx="8" fill="url(#g)" opacity="0.35" />
	<!--
	  Stacked for 32×32: couple emoji (tiny) + T ♪ S (initials + note).
	  If the tab icon looks muddy on a non-Retina screen, remove the first <text> or shorten to "TS".
	-->
	<text
		x="16"
		y="11"
		text-anchor="middle"
		font-size="8"
		font-family="system-ui, 'Apple Color Emoji', 'Segoe UI Emoji', 'Noto Color Emoji', sans-serif"
	>💑</text>
	<text
		x="16"
		y="23.5"
		text-anchor="middle"
		font-family="Georgia, 'Times New Roman', serif"
		font-size="10"
		font-weight="700"
		fill="#9f1239"
		letter-spacing="0.02em"
	>T ♪ S</text>
	<defs>
		<linearGradient id="g" x1="4" y1="4" x2="28" y2="28" gradientUnits="userSpaceOnUse">
			<stop stop-color="#fda4af" />
			<stop offset="1" stop-color="#9f1239" stop-opacity="0.4" />
		</linearGradient>
	</defs>
</svg>
